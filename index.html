<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e17">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>ILO Study Cards</title>
<style>
  /* === Font Face Declarations === */
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/JetBrainsMono-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('fonts/JetBrainsMono-SemiBold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url('fonts/JetBrainsMono-Bold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'JetBrains Mono';
    font-style: normal;
    font-weight: 800;
    font-display: swap;
    src: url('fonts/JetBrainsMono-ExtraBold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Sans';
    font-style: normal;
    font-weight: 300;
    font-display: swap;
    src: url('fonts/IBMPlexSans-Light.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Sans';
    font-style: normal;
    font-weight: 400;
    font-display: swap;
    src: url('fonts/IBMPlexSans-Regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Sans';
    font-style: normal;
    font-weight: 500;
    font-display: swap;
    src: url('fonts/IBMPlexSans-Medium.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Sans';
    font-style: normal;
    font-weight: 600;
    font-display: swap;
    src: url('fonts/IBMPlexSans-SemiBold.woff2') format('woff2');
  }
  @font-face {
    font-family: 'IBM Plex Sans';
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url('fonts/IBMPlexSans-Bold.woff2') format('woff2');
  }

  /* === Reset === */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  /* === Design System Custom Properties === */
  :root {
    --bg: #0a0e17;
    --surface: #0f1923;
    --card-front: #0f1923;
    --card-back: #111a26;
    --accent: #00d4aa;
    --accent-dim: #00a88530;
    --amber: #f0b429;
    --amber-dim: #f0b42920;
    --red: #ff4d6a;
    --red-dim: #ff4d6a20;
    --green: #34d399;
    --green-dim: #34d39920;
    --blue: #38bdf8;
    --blue-dim: #38bdf820;
    --purple: #a78bfa;
    --purple-dim: #a78bfa20;
    --text-primary: #e8edf4;
    --text-secondary: #8899aa;
    --text-dim: #4a5a6a;
    --border: #1a2a3a;
    --glow: 0 0 30px #00d4aa15;
  }

  /* === Base === */
  html, body { min-height: 100%; font-family: 'IBM Plex Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); }

  /* === App Shell === */
  .app {
    display: flex; flex-direction: column; align-items: center;
    min-height: 100dvh; max-width: 520px; margin: 0 auto;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
  }

  /* === Header === */
  .header { padding: 12px 20px 8px; text-align: center; }
  .header h1 {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
    letter-spacing: 3px; text-transform: uppercase; color: var(--accent);
  }
  .header .subtitle { font-size: 10px; color: var(--text-dim); letter-spacing: 1px; margin-top: 2px; }

  /* === Card Area & Container === */
  .card-area { width: 100%; padding: 6px 20px; perspective: 1200px; }
  .card {
    display: grid; cursor: pointer; transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    grid-area: 1 / 1; border-radius: 16px;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; flex-direction: column;
  }

  /* === Front Face === */
  .card-front {
    position: relative;
    background: var(--card-front); border: 1px solid var(--border);
    box-shadow: var(--glow); align-items: center; justify-content: center;
    gap: 10px; padding: 28px; min-height: 280px;
  }
  .front-id {
    font-family: 'JetBrains Mono', monospace; font-size: 51px; font-weight: 800;
    color: var(--accent); text-shadow: 0 0 40px #00d4aa30; line-height: 1;
  }
  .front-name {
    font-size: 17px; font-weight: 500; color: var(--text-secondary);
    text-align: center; max-width: 300px; line-height: 1.3;
  }
  .front-name.trip-name {
    color: var(--green); font-size: 19.5px;
  }
  .front-hint {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--text-dim); letter-spacing: 2px; margin-top: 4px;
  }

  /* === Back Face === */
  .card-back {
    position: relative;
    background: var(--card-back); border: 1px solid var(--border);
    transform: rotateY(180deg); padding: 16px 18px;
  }
  .back-header {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700;
    color: var(--accent); margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .back-section { margin-bottom: 8px; }
  .section-label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px;
    padding: 2px 8px; border-radius: 4px; display: inline-block;
  }
  .label-amber  { background: var(--amber-dim);  color: var(--amber); }
  .label-red    { background: var(--red-dim);    color: var(--red); }
  .label-green  { background: var(--green-dim);  color: var(--green); }
  .label-blue   { background: var(--blue-dim);   color: var(--blue); }
  .label-purple { background: var(--purple-dim); color: var(--purple); }

  .back-value {
    font-size: 13px; font-weight: 600; color: var(--text-primary);
    line-height: 1.5; padding-left: 14px; position: relative; margin-bottom: 2px;
  }
  .back-value::before { content: '\25B8'; position: absolute; left: 0; color: var(--accent); }
  .back-sub {
    font-size: 12px; color: var(--text-secondary); line-height: 1.5;
    padding-left: 28px; position: relative; margin-bottom: 2px;
  }
  .back-sub::before { content: '\203A'; position: absolute; left: 16px; color: var(--text-dim); }

  /* === Deck Selector === */
  .deck-selector {
    display: flex; flex-wrap: wrap; gap: 6px;
    justify-content: center; padding: 6px 20px;
  }
  .deck-btn {
    padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .deck-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: var(--accent-dim);
  }
  .deck-btn:active { transform: scale(0.95); }
  .deck-count {
    font-size: 9px; opacity: 0.7; margin-left: 4px;
  }

  /* === Nav Bar === */
  .nav-bar {
    display: flex; align-items: center; justify-content: center;
    gap: 12px; padding: 12px 20px;
  }
  .flip-btn {
    padding: 0 28px; height: 44px; border-radius: 10px; border: 1px solid var(--accent);
    background: var(--accent-dim); color: var(--accent);
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  }
  .flip-btn:active { background: var(--accent); color: var(--bg); transform: scale(0.95); }

  /* === Empty State === */
  .empty-state {
    text-align: center; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 1px; padding: 60px 20px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { line-height: 1.6; }

  /* === Progress Bar === */
  .progress-container {
    width: 100%; padding: 4px 20px; position: relative;
  }
  .progress-bar {
    height: 3px; background: var(--accent); border-radius: 2px;
    transition: width 0.3s ease; width: 0%;
  }
  .progress-text {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--text-dim); text-align: center; margin-top: 4px;
    letter-spacing: 1px;
  }

  /* === Nav Buttons === */
  .nav-btn {
    width: 44px; height: 44px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); font-size: 18px;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .nav-btn:active { background: var(--accent-dim); color: var(--accent); transform: scale(0.95); }
  .shuffle-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* === Update Toast === */
  .update-toast {
    position: fixed;
    bottom: -60px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: var(--bg);
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-weight: 600;
    display: flex;
    gap: 12px;
    align-items: center;
    transition: bottom 0.3s ease;
    z-index: 1000;
    max-width: 400px;
  }
  .update-toast.visible {
    bottom: 24px;
  }
  .update-toast-message {
    font-size: 14px;
    font-weight: 400;
    white-space: nowrap;
  }
  .update-btn {
    background: var(--bg);
    color: var(--accent);
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    white-space: nowrap;
    min-height: 44px;
    display: flex;
    align-items: center;
  }
  .update-btn:focus-visible {
    outline: 2px solid rgba(10, 14, 23, 0.5);
    outline-offset: 2px;
  }
  .update-dismiss {
    background: transparent;
    border: none;
    color: rgba(10, 14, 23, 0.6);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .update-dismiss:focus-visible {
    outline: 2px solid rgba(10, 14, 23, 0.5);
    outline-offset: 2px;
  }

  /* === Flagged Card Border === */
  .card.flagged .card-front,
  .card.flagged .card-back {
    border-color: var(--red);
    border-width: 2px;
  }

  /* === Flag Button === */
  .flag-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    font-size: 18px;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.15s;
    z-index: 10;
  }
  .flag-btn.flagged {
    color: var(--red);
  }

  /* === FLAGGED Deck Button === */
  .deck-btn.flagged-btn.active {
    border-color: var(--red);
    color: var(--red);
    background: var(--red-dim);
  }
  .deck-btn.flagged-btn:disabled {
    opacity: 0.4;
    cursor: default;
  }

  /* === Note Section === */
  .note-section {
    margin-top: 12px;
  }
  .note-input {
    width: 100%;
    min-height: 48px;
    max-height: 96px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--amber);
    font-style: italic;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    line-height: 1.5;
    padding: 8px 12px;
    resize: vertical;
  }
  .note-input::placeholder {
    color: var(--text-dim);
    font-style: italic;
  }
  .note-input:focus {
    outline: none;
    border-color: var(--amber);
  }

  /* === Rating Buttons === */
  .rating-bar {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin: 12px 0 4px;
  }
  .rate-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    line-height: 1.3;
    border: 1px solid;
  }
  .rate-btn:active { transform: scale(0.95); }
  .rate-btn.rate-again  { background: var(--red-dim);    border-color: var(--red);    color: var(--red); }
  .rate-btn.rate-hard   { background: var(--amber-dim);  border-color: var(--amber);  color: var(--amber); }
  .rate-btn.rate-good   { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }
  .rate-btn.rate-easy   { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }
  .rate-sub {
    font-size: 8px;
    opacity: 0.7;
    font-weight: 400;
    display: block;
    margin-top: 2px;
  }

  /* === Box Indicator Pill === */
  .box-pill {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .box-pill.box-1 { background: var(--red-dim);    color: var(--red); }
  .box-pill.box-2 { background: var(--amber-dim);  color: var(--amber); }
  .box-pill.box-3 { background: var(--blue-dim);   color: var(--blue); }
  .box-pill.box-4 { background: var(--green-dim);  color: var(--green); }
  .box-pill.box-5 { background: var(--purple-dim); color: var(--purple); }

  /* === Study Mode Card Indicator === */
  .card-area.study-mode .card-front,
  .card-area.study-mode .card-back {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(0, 212, 170, 0.15);
  }

  /* === Study Button Active State === */
  .study-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* === Mastery Dashboard Overlay === */
  .mastery-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10, 14, 23, 0.92);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .mastery-overlay.visible {
    opacity: 1;
    pointer-events: auto;
  }
  .mastery-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    max-width: 460px;
    width: calc(100% - 40px);
    max-height: 80vh;
    overflow-y: auto;
  }
  .mastery-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 20px;
  }
  .mastery-overall {
    text-align: center;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .mastery-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 42px;
    font-weight: 800;
    color: var(--accent);
  }
  .mastery-pct-label {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .mastery-deck {
    margin-bottom: 14px;
  }
  .mastery-deck-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .mastery-bar {
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
    display: flex;
    background: var(--bg);
  }
  .mastery-seg {
    height: 100%;
    transition: width 0.3s;
  }
  .mastery-seg.seg-1 { background: var(--red); }
  .mastery-seg.seg-2 { background: var(--amber); }
  .mastery-seg.seg-3 { background: var(--blue); }
  .mastery-seg.seg-4 { background: var(--green); }
  .mastery-seg.seg-5 { background: var(--purple); }
  .mastery-session {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .mastery-stat {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .mastery-stat-val { font-weight: 600; }
  .mastery-stat-val.up { color: var(--green); }
  .mastery-stat-val.down { color: var(--red); }
  .mastery-close-btn {
    display: block;
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 16px;
  }
  .mastery-close-btn:active { background: var(--accent); color: var(--bg); }
  .mastery-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .mastery-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .mastery-actions button:active { transform: scale(0.95); }
  .mastery-keep-btn {
    border: 1px solid var(--accent);
    background: var(--accent-dim);
    color: var(--accent);
  }
  .mastery-done-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
  }

  /* === Deck selector disabled in study mode === */
  .deck-selector.disabled .deck-btn {
    opacity: 0.4;
    pointer-events: none;
  }

  /* === Tools Bar === */
  .tools-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 8px 20px;
    border-top: 1px solid var(--border);
  }
  .tool-btn {
    padding: 8px 16px;
    height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-secondary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .tool-btn:active {
    transform: scale(0.95);
  }
  .tool-feedback {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 11px;
    color: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .tool-feedback.visible {
    opacity: 1;
  }
  .tool-feedback.error {
    color: var(--red);
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>ILO Study Cards</h1>
    <div class="subtitle">SNUPPS PWR &middot; ILO Study Material</div>
  </div>

  <div class="deck-selector" id="deckSelector"></div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">1 / 55 (2%)</div>
  </div>

  <div class="card-area">
    <div class="card" id="card" onclick="flipCard()">
      <!-- FRONT -->
      <div class="card-face card-front">
        <div class="front-id" id="frontId"></div>
        <div class="front-name" id="frontName"></div>
        <div class="front-hint">TAP TO FLIP</div>
      </div>
      <!-- BACK -->
      <div class="card-face card-back">
        <div class="back-header" id="backHeader"></div>
        <div class="back-sections" id="backSections"></div>
      </div>
    </div>
  </div>

  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">&#x1F4DA;</div>
    <div class="empty-text">Select a category to begin studying</div>
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" onclick="goToPrev()" aria-label="Previous card">&larr;</button>
    <button class="flip-btn" onclick="flipCard()">FLIP</button>
    <button class="nav-btn" id="nextBtn" onclick="goToNext()" aria-label="Next card">&rarr;</button>
    <button class="nav-btn shuffle-btn" id="shuffleBtn" onclick="toggleShuffle()" aria-label="Toggle shuffle">&#x1F500;</button>
    <button class="nav-btn study-btn" id="studyBtn" onclick="toggleStudyMode()" aria-label="Toggle study mode">&#x1F4D6;</button>
  </div>

  <div class="tools-bar">
    <button class="tool-btn" onclick="exportData()">EXPORT BACKUP</button>
    <span class="tool-feedback" id="exportFeedback"></span>
    <button class="tool-btn" onclick="document.getElementById('importFile').click()">IMPORT BACKUP</button>
    <span class="tool-feedback" id="importFeedback"></span>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(this.files[0]); this.value='';">
  </div>
</div>

  <div class="mastery-overlay" id="masteryOverlay" onclick="if(event.target===this)closeMasteryDashboard()">
    <div class="mastery-panel" id="masteryPanel"></div>
  </div>

<script src="decks.js"></script>
<script>
  const state = {
    selectedDecks: new Set(DECKS.map(d => d.id)),
    activeCards: [],
    currentIndex: 0,
    isFlipped: false,
    isShuffled: false
  };

  function getDeckForCard(card) {
    for (var i = 0; i < DECKS.length; i++) {
      if (DECKS[i].cards.indexOf(card) !== -1) return DECKS[i];
    }
    return null;
  }

  function getCardKey(card) {
    var deck = getDeckForCard(card);
    return deck.id + ':' + card.id;
  }

  function isCardFlagged(card) {
    var flags = JSON.parse(localStorage.getItem('ilo-flags') || '{}');
    return !!flags[getCardKey(card)];
  }

  function toggleFlagCurrent() {
    var card = state.activeCards[state.currentIndex];
    if (!card) return;
    var flags = JSON.parse(localStorage.getItem('ilo-flags') || '{}');
    var key = getCardKey(card);
    if (flags[key]) {
      delete flags[key];
    } else {
      flags[key] = true;
    }
    localStorage.setItem('ilo-flags', JSON.stringify(flags));
    renderCard(card);
    document.getElementById('card').classList.toggle('flagged', isCardFlagged(card));
    updateFlaggedCount();
  }

  function getFlaggedCount() {
    return Object.keys(JSON.parse(localStorage.getItem('ilo-flags') || '{}')).length;
  }

  function updateFlaggedCount() {
    var count = getFlaggedCount();
    var btn = document.querySelector('.flagged-btn');
    if (!btn) return;
    var countSpan = btn.querySelector('.deck-count');
    if (countSpan) countSpan.textContent = count;
    btn.disabled = count === 0;
    if (count === 0 && state.selectedDecks.has('__flagged__')) {
      state.selectedDecks.delete('__flagged__');
      renderDeckSelector();
      rebuildActiveCards();
    }
  }

  function toggleFlagged() {
    if (state.selectedDecks.has('__flagged__')) {
      state.selectedDecks.delete('__flagged__');
    } else {
      state.selectedDecks.clear();
      state.selectedDecks.add('__flagged__');
    }
    renderDeckSelector();
    rebuildActiveCards();
  }

  function getCardNote(card) {
    var notes = JSON.parse(localStorage.getItem('ilo-notes') || '{}');
    return notes[getCardKey(card)] || '';
  }

  function saveNote(textareaEl) {
    var key = textareaEl.getAttribute('data-key');
    var value = textareaEl.value.trim();
    var notes = JSON.parse(localStorage.getItem('ilo-notes') || '{}');
    if (value === '') {
      delete notes[key];
    } else {
      notes[key] = value;
    }
    localStorage.setItem('ilo-notes', JSON.stringify(notes));
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function renderCard(card) {
    var deck = getDeckForCard(card);
    var isTrip = deck && (deck.id === 'reactor-trips' || deck.id === 'turbine-trips');
    var isFlagged = isCardFlagged(card);

    var flagBtnHtml = '<button class="flag-btn' + (isFlagged ? ' flagged' : '') +
      '" onclick="event.stopPropagation(); toggleFlagCurrent()" aria-label="' +
      (isFlagged ? 'Unflag card' : 'Flag card') + '" aria-pressed="' + isFlagged + '">\u2691</button>';

    var frontIdEl = document.getElementById('frontId');
    var frontNameEl = document.getElementById('frontName');

    frontIdEl.textContent = isTrip ? '' : card.id;
    frontIdEl.style.display = isTrip ? 'none' : '';
    frontNameEl.textContent = card.title;
    frontNameEl.classList.toggle('trip-name', isTrip);

    // Add flag button to card front
    var cardFront = document.querySelector('.card-front');
    var existingFrontFlag = cardFront.querySelector('.flag-btn');
    if (existingFrontFlag) existingFrontFlag.remove();
    cardFront.insertAdjacentHTML('beforeend', flagBtnHtml);

    document.getElementById('backHeader').innerHTML = card.id + ' \u2014 ' + card.title;

    var sectionsEl = document.getElementById('backSections');
    sectionsEl.innerHTML = card.sections.map(function(section) {
      return '<div class="back-section">' +
        '<div class="section-label label-' + section.color + '">' + section.label.toUpperCase() + '</div>' +
        section.items.map(function(item) {
          return item.sub
            ? '<div class="back-sub">' + item.text + '</div>'
            : '<div class="back-value">' + item.text + '</div>';
        }).join('') +
      '</div>';
    }).join('');

    // Add note textarea after sections
    var noteKey = getCardKey(card);
    var noteText = getCardNote(card);
    sectionsEl.innerHTML += '<div class="note-section"><textarea class="note-input" placeholder="Add study notes..." onblur="saveNote(this)" onclick="event.stopPropagation()" data-key="' + noteKey + '">' + escapeHtml(noteText) + '</textarea></div>';

    // Add flag button to card back
    var cardBack = document.querySelector('.card-back');
    var existingBackFlag = cardBack.querySelector('.flag-btn');
    if (existingBackFlag) existingBackFlag.remove();
    cardBack.insertAdjacentHTML('afterbegin', flagBtnHtml);

    // Toggle flagged class on card element
    document.getElementById('card').classList.toggle('flagged', isFlagged);
  }

  function goToCard(index) {
    if (state.activeCards.length === 0) return;
    // Wrap around
    if (index < 0) index = state.activeCards.length - 1;
    if (index >= state.activeCards.length) index = 0;

    state.currentIndex = index;
    state.isFlipped = false;
    document.getElementById('card').classList.remove('flipped');

    renderCard(state.activeCards[index]);
    updateProgress();
  }

  function goToNext() { goToCard(state.currentIndex + 1); }
  function goToPrev() { goToCard(state.currentIndex - 1); }

  function updateProgress() {
    var total = state.activeCards.length;
    var current = total > 0 ? state.currentIndex + 1 : 0;
    var pct = total > 0 ? Math.round(current / total * 100) : 0;

    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = current + ' / ' + total + ' (' + pct + '%)';
  }

  function rebuildActiveCards() {
    var cards;
    if (state.selectedDecks.has('__flagged__')) {
      cards = DECKS.flatMap(function(d) { return d.cards; })
        .filter(function(card) { return isCardFlagged(card); });
    } else {
      cards = DECKS
        .filter(function(d) { return state.selectedDecks.has(d.id); })
        .flatMap(function(d) { return d.cards; });
    }

    if (state.isShuffled) {
      cards = shuffleArray(cards.slice());
    }

    state.activeCards = cards;
    state.currentIndex = 0;
    state.isFlipped = false;
    document.getElementById('card').classList.remove('flipped');

    if (cards.length > 0) {
      document.getElementById('card').parentElement.style.display = '';
      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('progressContainer').style.display = '';
      renderCard(cards[0]);
    } else {
      document.getElementById('card').parentElement.style.display = 'none';
      document.getElementById('emptyState').style.display = '';
      document.getElementById('progressContainer').style.display = 'none';
      // Show flagged-specific empty state
      if (state.selectedDecks.has('__flagged__')) {
        var emptyEl = document.getElementById('emptyState');
        emptyEl.querySelector('.empty-text').innerHTML = '<strong>No flagged cards</strong><br>Tap the flag icon on any card to mark it for review';
      }
    }
    updateProgress();
  }

  function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var temp = arr[i];
      arr[i] = arr[j];
      arr[j] = temp;
    }
    return arr;
  }

  function flipCard() {
    if (state.activeCards.length === 0) return;
    state.isFlipped = !state.isFlipped;
    document.getElementById('card').classList.toggle('flipped', state.isFlipped);
  }

  function renderDeckSelector() {
    var container = document.getElementById('deckSelector');
    var totalCards = DECKS.reduce(function(sum, d) { return sum + d.cards.length; }, 0);
    var allActive = state.selectedDecks.size === DECKS.length && !state.selectedDecks.has('__flagged__');
    var flaggedCount = getFlaggedCount();
    var flaggedActive = state.selectedDecks.has('__flagged__');

    var html = '<button class="deck-btn' + (allActive ? ' active' : '') +
      '" data-deck="all" onclick="toggleAll()">ALL <span class="deck-count">' +
      totalCards + '</span></button>';

    html += '<button class="deck-btn flagged-btn' + (flaggedActive ? ' active' : '') + '"' +
      (flaggedCount === 0 ? ' disabled' : '') +
      ' data-deck="__flagged__" onclick="toggleFlagged()">FLAGGED <span class="deck-count">' +
      flaggedCount + '</span></button>';

    DECKS.forEach(function(deck) {
      var isActive = state.selectedDecks.has(deck.id);
      html += '<button class="deck-btn' + (isActive ? ' active' : '') +
        '" data-deck="' + deck.id + '" onclick="toggleDeck(\'' + deck.id + '\')">' +
        deck.shortName + ' <span class="deck-count">' + deck.cards.length + '</span></button>';
    });

    container.innerHTML = html;
  }

  function toggleDeck(deckId) {
    state.selectedDecks.delete('__flagged__');
    if (state.selectedDecks.has(deckId)) {
      state.selectedDecks.delete(deckId);
    } else {
      state.selectedDecks.add(deckId);
    }
    renderDeckSelector();
    rebuildActiveCards();
  }

  function toggleAll() {
    state.selectedDecks.delete('__flagged__');
    if (state.selectedDecks.size === DECKS.length) {
      state.selectedDecks.clear();
    } else {
      DECKS.forEach(function(d) { state.selectedDecks.add(d.id); });
    }
    renderDeckSelector();
    rebuildActiveCards();
  }

  function toggleShuffle() {
    state.isShuffled = !state.isShuffled;
    var currentCard = state.activeCards[state.currentIndex];
    rebuildActiveCards();
    if (currentCard && state.activeCards.length > 0) {
      var newIndex = state.activeCards.indexOf(currentCard);
      if (newIndex !== -1) {
        state.currentIndex = newIndex;
      }
    }
    var shuffleBtn = document.getElementById('shuffleBtn');
    if (shuffleBtn) {
      shuffleBtn.classList.toggle('active', state.isShuffled);
    }
  }

  document.addEventListener('keydown', function(e) {
    // Don't intercept when focus is on interactive elements (pitfall 6)
    if (e.target.closest('button, input, textarea, select')) return;

    switch (e.key) {
      case 'ArrowLeft':
        e.preventDefault();
        goToPrev();
        break;
      case 'ArrowRight':
        e.preventDefault();
        goToNext();
        break;
      case ' ':
      case 'Enter':
        e.preventDefault();
        flipCard();
        break;
      case 's':
      case 'S':
        e.preventDefault();
        toggleShuffle();
        break;
    }
  });

  // Touch swipe detection
  var touchStartX = 0;
  var touchStartY = 0;
  var cardArea = document.querySelector('.card-area');

  cardArea.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
  }, { passive: true });

  cardArea.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    // Must be primarily horizontal and exceed 50px threshold
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
      if (dx > 0) {
        goToPrev(); // swipe right = previous
      } else {
        goToNext(); // swipe left = next
      }
    }
  }, { passive: true });

  function showFeedback(elementId, message, isError, duration) {
    var el = document.getElementById(elementId);
    if (!el) return;
    el.textContent = message;
    el.classList.add('visible');
    if (isError) el.classList.add('error');
    setTimeout(function() {
      el.classList.remove('visible');
      el.classList.remove('error');
    }, duration || (isError ? 3000 : 2000));
  }

  function exportData() {
    var data = {
      version: 1,
      exported: new Date().toISOString(),
      flags: JSON.parse(localStorage.getItem('ilo-flags') || '{}'),
      notes: JSON.parse(localStorage.getItem('ilo-notes') || '{}')
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'ilo-study-backup.json';
    a.click();
    URL.revokeObjectURL(url);
    showFeedback('exportFeedback', 'Backup exported', false, 2000);
  }

  function importData(file) {
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!data.flags && !data.notes) {
          showFeedback('importFeedback', 'Invalid backup file', true, 3000);
          return;
        }
        var existingFlags = JSON.parse(localStorage.getItem('ilo-flags') || '{}');
        var existingNotes = JSON.parse(localStorage.getItem('ilo-notes') || '{}');
        if (data.flags) {
          Object.assign(existingFlags, data.flags);
          localStorage.setItem('ilo-flags', JSON.stringify(existingFlags));
        }
        if (data.notes) {
          Object.assign(existingNotes, data.notes);
          localStorage.setItem('ilo-notes', JSON.stringify(existingNotes));
        }
        renderDeckSelector();
        rebuildActiveCards();
        if (state.activeCards[state.currentIndex]) {
          renderCard(state.activeCards[state.currentIndex]);
        }
        showFeedback('importFeedback', 'Backup imported', false, 2000);
      } catch (err) {
        showFeedback('importFeedback', 'Invalid backup file', true, 3000);
      }
    };
    reader.onerror = function() {
      showFeedback('importFeedback', 'Invalid backup file', true, 3000);
    };
    reader.readAsText(file);
  }

  renderDeckSelector();
  rebuildActiveCards();
</script>

<div id="update-toast" class="update-toast" role="alert" aria-live="polite">
  <span class="update-toast-message">New cards available</span>
  <button class="update-btn" id="update-btn">Reload to Update</button>
  <button class="update-dismiss" id="update-dismiss" aria-label="Dismiss update notification">&times;</button>
</div>

<script>
// Service Worker Registration and Update Detection
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(registration) {
      registration.addEventListener('updatefound', function() {
        var newWorker = registration.installing;
        newWorker.addEventListener('statechange', function() {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateToast();
          }
        });
      });
    });
  });
}

function showUpdateToast() {
  var toast = document.getElementById('update-toast');
  toast.classList.add('visible');
}

function applyUpdate() {
  navigator.serviceWorker.ready.then(function(registration) {
    if (registration.waiting) {
      registration.waiting.postMessage({ type: 'SKIP_WAITING' });
    }
  });
  navigator.serviceWorker.addEventListener('controllerchange', function() {
    window.location.reload();
  });
}

function dismissUpdate() {
  var toast = document.getElementById('update-toast');
  toast.classList.remove('visible');
}

document.getElementById('update-btn').addEventListener('click', applyUpdate);
document.getElementById('update-dismiss').addEventListener('click', dismissUpdate);
</script>
</body>
</html>
